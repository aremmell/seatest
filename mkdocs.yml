site_name: seatest
site_description: "A featherweight, comprehensive cross-platform test framework wrriten in C, for C."
site_author: Ryan M. Lederman
site_url: https://seatest.rml.dev
repo_url: https://github.com/aremmell/seatest
plugins:
  - search
theme:
  name: material
  language: en
  logo: sources/logo.png
  icon:
    repo: fontawesome/brands/github
  features:
      - navigation.instant
      - navigation.tracking
      - navigation.sections
      - navigation.expand
      - navigation.indexes
      - navigation.top
      - navigation.footer
      - content.code.copy
      - toc.follow
      - toc.integrate
  palette:
    scheme: slate
    primary: black
    accent: blue
  font:
    code: Source Code Pro
markdown_extensions:
  - toc
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
extra:
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
copyright: Copyright &copy; 2026 Ryan M. Lederman
